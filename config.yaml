# Fill this out as an alternative to running setup_wizard.py
# Then run: python config_from_yaml.py  to write .env
# ============================================================

# ── SENDER IDENTITY ──────────────────────────────────────────
identity:
  name:       "Kenyon Jones"
  email:      "kjonesmle@gmail.com"
  phone:      "7018705235"
  alt_name:   "Cynthia Ennis"
  alt_phone:  "7019465731"

# ── EMAIL ────────────────────────────────────────────────────
email:
  method: "both"           # api | smtp | both
  # Gmail API
  credentials_json:  "credentials.json"    # Path to OAuth2 creds JSON
  # SMTP fallback
  smtp_user:     "kjonesmle@gmail.com"
  smtp_password: ""                         # Your 16-char Gmail App Password

# ── GCP ──────────────────────────────────────────────────────
gcp:
  enabled:        true
  project_id:     "arc-fleet-campaign"
  region:         "us-central1"
  bucket:         "arc-fleet-assets"
  service_account_json: "service-account.json"

# ── TWILIO ───────────────────────────────────────────────────
twilio:
  enabled:        false     # Set to true once you have credentials
  account_sid:    ""        # ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
  auth_token:     ""        # Secret — prefer to set via env var
  from_number:    ""        # +1xxxxxxxxxx

# ── BLAND.AI ─────────────────────────────────────────────────
bland:
  enabled:        false     # Set to true once you have credentials
  api_key:        ""        # Secret — prefer to set via env var
  phone_number:   ""        # +1xxxxxxxxxx (your Bland number)
  transfer_to:    "7018705235"    # Kenyon direct — hardcoded in stubs.py

# ── DEPLOYMENT ───────────────────────────────────────────────
deployment:
  target:       "local"     # local | gcp | codespaces | docker
  port:          8080
  debug:         false

# ── CAMPAIGN SETTINGS ────────────────────────────────────────
campaign:
  default_dry_run:       true
  formfill_submit:       false    # DANGER: only enable after screenshot review
  rate_limit_delay:      2.0      # Seconds between emails
  formfill_concurrency:  3        # Parallel Playwright sessions
  formfill_delay:        2.0      # Seconds between batches

